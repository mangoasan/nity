name: nity-local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-nity_db}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nity} -d ${POSTGRES_DB:-nity_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-nity}:${POSTGRES_PASSWORD:-change_me_local_password}@postgres:5432/${POSTGRES_DB:-nity_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_me_local_jwt_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your_google_client_id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your_google_client_secret}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:${API_PORT:-3101}}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:${API_PORT:-3101}/api/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:${WEB_PORT:-3100}}
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@nity.kz}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123456}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-user@nity.kz}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-user123456}
    ports:
      - "${API_PORT:-3101}:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${API_PORT:-3101}/api}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${API_PORT:-3101}/api}
      INTERNAL_API_URL: http://api:3001/api
    ports:
      - "${WEB_PORT:-3100}:3000"

volumes:
  postgres_data:
